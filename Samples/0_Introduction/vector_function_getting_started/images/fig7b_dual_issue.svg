<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="410" viewBox="0 0 1000 410" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">
<text x="500" y="40" font-size="23" fill="#3D3D3A" font-weight="800" text-anchor="middle">指令并行执行</text>
<text x="500" y="66" font-size="14" fill="#73726C" font-weight="400" text-anchor="middle">大部分相同指令可以并行执行，不同指令天然可以并行执行</text>

<!-- ===== Row 1: same instruction, parallel ===== -->
<text x="64" y="146" font-size="18" fill="#3D3D3A" font-weight="700" text-anchor="start">相同指令</text>
<text x="64" y="168" font-size="13" fill="#73726C" font-weight="400" text-anchor="start">如 两条 Add</text>
<rect x="415" y="110" width="170" height="80" rx="12" fill="none" stroke="#B7B6AE" stroke-width="1.4" stroke-dasharray="5 5"/>
<rect x="425" y="114" width="150" height="28" rx="8" fill="#EAE8FB" stroke="#534AB7" stroke-width="2"/>
<text x="500" y="133" font-size="15" fill="#3C3489" font-weight="700" text-anchor="middle">Add</text>
<rect x="425" y="158" width="150" height="28" rx="8" fill="#EAE8FB" stroke="#534AB7" stroke-width="2"/>
<text x="500" y="177" font-size="15" fill="#3C3489" font-weight="700" text-anchor="middle">Add</text>
<text x="700" y="156" font-size="16" fill="#0F8A66" font-weight="700" text-anchor="start">✓ 大部分可以并行执行</text>

<!-- ===== Row 2: rare same instruction, serial ===== -->
<text x="64" y="246" font-size="18" fill="#3D3D3A" font-weight="700" text-anchor="start">少数相同指令</text>
<text x="64" y="268" font-size="13" fill="#73726C" font-weight="400" text-anchor="start">如 两条 ReduceSum</text>
<rect x="352" y="236" width="130" height="28" rx="8" fill="#DDF1E9" stroke="#0F8A66" stroke-width="2"/>
<text x="417" y="255" font-size="14" fill="#0B5A45" font-weight="700" text-anchor="middle">ReduceSum</text>
<text x="500" y="256" font-size="18" fill="#A8A79F" font-weight="700" text-anchor="middle">→</text>
<rect x="518" y="236" width="130" height="28" rx="8" fill="#DDF1E9" stroke="#0F8A66" stroke-width="2"/>
<text x="583" y="255" font-size="14" fill="#0B5A45" font-weight="700" text-anchor="middle">ReduceSum</text>
<text x="700" y="256" font-size="16" fill="#C0453A" font-weight="700" text-anchor="start">✗ 无法并行，只能串行</text>

<!-- ===== Row 3: different instructions, parallel ===== -->
<text x="64" y="346" font-size="18" fill="#3D3D3A" font-weight="700" text-anchor="start">不同指令</text>
<text x="64" y="368" font-size="13" fill="#73726C" font-weight="400" text-anchor="start">如 Mul + ReduceSum</text>
<rect x="415" y="310" width="170" height="80" rx="12" fill="none" stroke="#B7B6AE" stroke-width="1.4" stroke-dasharray="5 5"/>
<rect x="425" y="314" width="150" height="28" rx="8" fill="#EAE8FB" stroke="#534AB7" stroke-width="2"/>
<text x="500" y="333" font-size="15" fill="#3C3489" font-weight="700" text-anchor="middle">Mul</text>
<rect x="425" y="358" width="150" height="28" rx="8" fill="#DDF1E9" stroke="#0F8A66" stroke-width="2"/>
<text x="500" y="377" font-size="14" fill="#0B5A45" font-weight="700" text-anchor="middle">ReduceSum</text>
<text x="700" y="356" font-size="16" fill="#0F8A66" font-weight="700" text-anchor="start">✓ 天然可以并行执行</text>
</svg>
