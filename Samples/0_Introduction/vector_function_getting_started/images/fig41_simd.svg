<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="470" viewBox="0 0 1360 470" font-family="PingFang SC, Noto Sans CJK SC, sans-serif"><text x="260" y="78" font-size="22" fill="#3D3D3A" font-weight="800" text-anchor="middle">标量</text><rect x="150" y="205" width="62" height="62" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/><text x="181.0" y="244.0" font-size="22" fill="#3C3489" font-weight="700" text-anchor="middle">a</text><rect x="280" y="205" width="62" height="62" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/><text x="311.0" y="244.0" font-size="22" fill="#3C3489" font-weight="700" text-anchor="middle">b</text><rect x="410" y="205" width="62" height="62" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/><text x="441.0" y="244.0" font-size="22" fill="#3C3489" font-weight="700" text-anchor="middle">c</text><text x="245" y="245.0" font-size="26" fill="#3D3D3A" font-weight="700" text-anchor="middle">×</text><text x="375" y="245.0" font-size="26" fill="#3D3D3A" font-weight="700" text-anchor="middle">=</text><text x="260" y="315" font-size="18" fill="#73726C" font-weight="400" text-anchor="middle">1 条指令 → 1 个元素</text><line x1="540" y1="60" x2="540" y2="410" stroke="#D8D7D2" stroke-width="2" stroke-dasharray="6 8"/><text x="968.0" y="78" font-size="22" fill="#3D3D3A" font-weight="800" text-anchor="middle">SIMD（Vector Function）</text><text x="968.0" y="112" font-size="15" fill="#73726C" font-weight="400" text-anchor="middle">一个寄存器 = VECTOR_REG_WIDTH / sizeof(float) 个元素</text><text x="634" y="172.0" font-size="17" fill="#3C3489" font-weight="700" text-anchor="end">xReg</text><rect x="660" y="140" width="96" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/><text x="708.0" y="171.0" font-size="16" fill="#3C3489" font-weight="600" text-anchor="middle">x0</text><rect x="764" y="140" width="96" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/><text x="812.0" y="171.0" font-size="16" fill="#3C348