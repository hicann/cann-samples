<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="300" viewBox="0 0 1360 300" font-family="PingFang SC, Noto Sans CJK SC, sans-serif"><text x="680.0" y="62" font-size="24" fill="#3D3D3A" font-weight="800" text-anchor="middle">IPC（Instructions Per Cycle，每周期指令数）</text><text x="410" y="198" font-size="34" fill="#3D3D3A" font-weight="800" text-anchor="end">IPC =</text><rect x="450" y="120" width="480" height="46" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/><text x="690.0" y="150" font-size="18" fill="#3C3489" font-weight="700" text-anchor="middle">VF 中执行的 EXEC 类指令数</text><line x1="450" y1="185" x2="930" y2="185" stroke="#3D3D3A" stroke-width="2.4"/><rect x="550" y="204" width="280" height="46" rx="8" fill="#FBE7DD" stroke="#D85A30" stroke-width="2"/><text x="690.0" y="234" font-size="18" fill="#B5471F" font-weight="700" text-anchor="middle">VF 消耗的 Cycle 数</text><text x="680.0" y="286" font-size="16" fill="#73726C" font-weight="400" text-anchor="middle">EXEC 类 = 实际参与计算的指令，不含 Load / Store 访存指令</text></svg>
