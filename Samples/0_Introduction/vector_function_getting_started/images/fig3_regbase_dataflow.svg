<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="440" viewBox="0 0 1360 440" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">
<!-- UB bar -->
<rect x="150" y="56" width="1060" height="64" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="2.4"/>
<text x="680" y="96" font-size="24" fill="#085041" font-weight="700" text-anchor="middle">UB (Unified Buffer)</text>

<!-- step boxes -->
<rect x="325" y="310" width="150" height="58" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="2.2"/>
<text x="400" y="346" font-size="21" fill="#3C3489" font-weight="700" text-anchor="middle">步骤 1</text>
<rect x="605" y="310" width="150" height="58" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="2.2"/>
<text x="680" y="346" font-size="21" fill="#3C3489" font-weight="700" text-anchor="middle">步骤 2</text>
<rect x="885" y="310" width="150" height="58" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="2.2"/>
<text x="960" y="346" font-size="21" fill="#3C3489" font-weight="700" text-anchor="middle">步骤 3</text>
<text x="1075" y="346" font-size="22" fill="#73726C" font-weight="700" text-anchor="start">…</text>

<!-- single Load into step1 -->
<line x1="400" y1="120" x2="400" y2="295" stroke="#D85A30" stroke-width="3.0" stroke-linecap="round"/>
<polygon points="400,307 394.5,295 405.5,295" fill="#D85A30"/>
<circle cx="400" cy="120" r="6" fill="#D85A30"/>
<text x="385" y="212" font-size="15" fill="#D85A30" font-weight="700" text-anchor="end">Load</text>

<!-- gray register-to-register flow -->
<line x1="475" y1="339" x2="595" y2="339" stroke="#73726C" stroke-width="2.4" stroke-linecap="round"/>
<polygon points="605,339 595,343.6 595,334.4" fill="#73726C"/>
<line x1="755" y1="339" x2="875" y2="339" stroke="#73726C" stroke-width="2.4" stroke-linecap="round"/>
<polygon points="885,339 875,343.6 875,334.4" fill="#73726C"/>

<!-- single Store out of step3 -->
<line x1="960" y1="310" x2="960" y2="132" stroke="#D85A30" stroke-width="3.0" stroke-linecap="round"/>
<polygon points="960,120 965.5,132 954.5,132" fill="#D85A30"/>
<circle cx="960" cy="310" r="6" fill="#D85A30"/>
<text x="975" y="212" font-size="15" fill="#D85A30" font-weight="700" text-anchor="start">Store</text>

<text x="680" y="416" font-size="17" fill="#D85A30" font-weight="700" text-anchor="middle">数据在寄存器间流转，不回 UB —— 只在首尾各访问一次 UB</text>
</svg>
