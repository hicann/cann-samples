<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 414" font-family="Noto Sans CJK SC,Microsoft YaHei,PingFang SC,Segoe UI,Helvetica,Arial,sans-serif"><defs><marker id="mg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8.5" markerHeight="8.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="#2f855a"/></marker><marker id="mb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8.5" markerHeight="8.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="#2b6cb0"/></marker><marker id="mr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8.5" markerHeight="8.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="#d64545"/></marker></defs><rect width="900" height="414" fill="white"/><text x="24" y="32" font-size="18" fill="#1f2933" text-anchor="start" font-weight="700">reduce_sum_ar_binary：一行 250 元素的二分（成对）折叠</text><text x="24" y="52" font-size="12" fill="#52606d" text-anchor="start">每行 = 4 个 VL(64) 块，foldPoint=128（2 块）。配对相距 128 的块 → 串行步数 O(块)→O(log 块)，且成对求和降舍入误差。</text><rect x="40" y="86" width="176" height="30" rx="6" fill="#eef2f7" stroke="#7b8794" stroke-width="1.5"/><text x="128" y="106" font-size="13" fill="#1f2933" text-anchor="middle">c0  [0:64)</text><rect x="228" y="86" width="176" height="30" rx="6" fill="#eef2f7" stroke="#7b8794" stroke-width="1.5"/><text x="316" y="106" font-size="13" fill="#1f2933" text-anchor="middle">c1  [64:128)</text><rect x="416" y="86" width="176" height="30" rx="6" fill="#eef2f7" stroke="#7b8794" stroke-width="1.5"/><text x="504" y="106" font-size="13" fill="#1f2933" text-anchor="middle">c2  [128:192)</text><rect x="604" y="86" width="176" height="30" rx="6" fill="#fdeaea" stroke="#d64545" stroke-width="1.5"/><text x="692" y="106" font-size="13" fill="#1f2933" text-anchor="middle">c3  [192:250)</text><text x="780" y="78" font-size="11" fill="#d64545" text-anchor="end">尾 [250:256) padding → mask 屏蔽</text><text x="24" y="172" font-size="13" fill="#2f855a" text-anchor="start" font-weight="700">第 1 层（foldPoint=128，两条 Add 互相独立）</text><rect x="228" y="182" width="176" height="30" rx="6" fill="#eef2f7" stroke="#2f855a" stroke-width="1.5"/><text x="316" y="202" font-size="13" fill="#2f855a" text-anchor="middle">c0 + c2</text><rect x="416" y="182" width="176" height="30" rx="6" fill="#eef2f7" stroke="#2f855a" stroke-width="1.5"/><text x="504" y="201" font-size="11" fill="#2f855a" text-anchor="middle">c1 + c3  (MERGING,58)</text><path d="M 128 116 C 128 150, 292 148, 292 182" fill="none" stroke="#2f855a" stroke-width="2" marker-end="url(#mg)"/><path d="M 504 116 C 504 150, 340 148, 340 182" fill="none" stroke="#2f855a" stroke-width="2" marker-end="url(#mg)"/><path d="M 316 116 C 316 150, 468 148, 468 182" fill="none" stroke="#2b6cb0" stroke-width="2" marker-end="url(#mb)"/><path d="M 692 116 C 692 150, 540 148, 540 182" fill="none" stroke="#2b6cb0" stroke-width="2" marker-end="url(#mb)"/><text x="24" y="264" font-size="13" fill="#2f855a" text-anchor="start" font-weight="700">第 2 层：每 lane 含 4 块之和（64 lane）</text><rect x="320" y="278" width="180" height="30" rx="6" fill="#eef2f7" stroke="#2f855a" stroke-width="1.5"/><text x="410" y="298" font-size="12" fill="#2f855a" text-anchor="middle">(c0+c2) + (c1+c3)</text><path d="M 316 212 C 316 245, 388 245, 388 278" fill="none" stroke="#d64545" stroke-width="2.2" marker-end="url(#mr)"/><path d="M 504 212 C 504 245, 432 245, 432 278" fill="none" stroke="#d64545" stroke-width="2.2" marker-end="url(#mr)"/><rect x="326" y="348" width="168" height="30" rx="6" fill="#e9defa" stroke="#7e57c2" stroke-width="1.5"/><text x="410" y="367" font-size="10" fill="#1f2933" text-anchor="middle">向量内 ReduceSum → 行标量</text><path d="M 410 308 L 410 348" fill="none" stroke="#d64545" stroke-width="2.2" marker-end="url(#mr)"/><rect x="600" y="318" width="278" height="86" rx="8" fill="#f7faf7" stroke="#2f855a" stroke-width="1.2"/><text x="616" y="342" font-size="13" fill="#1f2933" text-anchor="start" font-weight="700">对照 baseline（线性逐块折叠）</text><text x="616" y="364" font-size="11" fill="#52606d" text-anchor="start">acc += c0→c1→c2→c3（串行步数 4），再 ReduceSum</text><text x="616" y="388" font-size="12" fill="#d64545" text-anchor="start" font-weight="700">PUSHQ VF：792 → 384 cycle（≈2×）</text></svg>