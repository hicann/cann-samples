<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="Noto Sans CJK SC,Microsoft YaHei,PingFang SC,Segoe UI,Helvetica,Arial,sans-serif"><defs><marker id="a" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto"><path d="M0,0 L7.5,3 L0,6 Z" fill="#1f2933"/></marker><marker id="ar" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto"><path d="M0,0 L7.5,3 L0,6 Z" fill="#d64545"/></marker></defs><rect width="900" height="470" fill="white"/><text x="24" y="32" font-size="18" fill="#1f2933" text-anchor="start" font-weight="700">为什么多路独立并行能提速：延迟隐藏（latency hiding）</text><text x="24" y="52" font-size="12" fill="#52606d" text-anchor="start">矢量指令「延迟 L 拍才出结果」，但矢量管线「每拍能发射 1 条」。下图每格 = 1 个发射拍（cycle），取 L=4。</text><text x="24" y="88" font-size="13" fill="#1f2933" text-anchor="start" font-weight="700">① baseline 单路串行：下一条 Max 必须等上一条出结果</text><text x="120" y="112" font-size="10" fill="#52606d" text-anchor="middle">0</text><text x="296" y="112" font-size="10" fill="#52606d" text-anchor="middle">4</text><text x="472" y="112" font-size="10" fill="#52606d" text-anchor="middle">8</text><text x="648" y="112" font-size="10" fill="#52606d" text-anchor="middle">12</text><text x="824" y="112" font-size="10" fill="#52606d" text-anchor="middle">16</text><text x="848" y="112" font-size="10" fill="#52606d" text-anchor="middle">cycle</text><rect x="120" y="120" width="44" height="30" rx="3" fill="#2b6cb0" stroke="#7b8794" stroke-width="1"/><text x="142.0" y="139.2" text-anchor="middle" font-size="12" fill="white">Max0</text><rect x="164" y="120" width="44" height="30" rx="3" fill="#eceff3" stroke="#7b8794" stroke-width="1" stroke-dasharray="3 2"/><text x="186.0" y="138.15" text-anchor="middle" font-size="9" fill="#52606d">空泡</text><rect x="208" y="120" width="44" height="30" rx="3" fill="#eceff3" stroke="#7b8794" stroke-width="1" stroke-dasharray="3 2"/><text x="230.0" y="138.15" text-anchor="middle" font-size="9" fill="#52606d">空泡</text><rect x="252" y="120" width="44" height="30" rx="3" fill="#eceff3" stroke="#7b8794" stroke-width="1" stroke-dasharray="3 2"/><text x="274.0" y="138.15" text-anchor="middle" font-size="9" fill="#52606d">空泡</text><rect x="296" y="120" width="44" height="30" rx="3" fill="#2b6cb0" stroke="#7b8794" stroke-width="1"/><text x="318.0" y="139.2" text-anchor="middle" font-size="12" fill="white">Max1</text><rect x="340" y="120" width="44" height="30" rx="3" fill="#eceff3" stroke="#7b8794" stroke-width="1" stroke-dasharray="3 2"/><text x="362.0" y="138.15" text-anchor="middle" font-size="9" fill="#52606d">空泡</text><rect x="384" y="120" width="44" height="30" rx="3" fill="#eceff3" stroke="#7b8794" stroke-width="1" stroke-dasharray="3 2"/><text x="406.0" y="138.15" text-anchor="middle" font-size="9" fill="#52606d">空泡</text><rect x="428" y="120" width="44" height="30" rx="3" fill="#eceff3" stroke="#7b8794" stroke-width="1" stroke-dasharray="3 2"/><text x="450.0" y="138.15" text-anchor="middle" font-size="9" fill="#52606d">空泡</text><rect x="472" y="120" width="44" height="30" rx="3" fill="#2b6cb0" stroke="#7b8794" stroke-width="1"/><text x="494.0" y="139.2" text-anchor="middle" font-size="12" fill="white">Max2</text><rect x="516" y="120" width="44" height="30" rx="3" fill="#eceff3" stroke="#7b8794" stroke-width="1" stroke-dasharray="3 2"/><text x="538.0" y="138.15" text-anchor="middle" font-size="9" fill="#52606d">空泡</text><rect x="560" y="120" width="44" height="30" rx="3" fill="#eceff3" stroke="#7b8794" stroke-width="1" stroke-dasharray="3 2"/><text x="582.0" y="138.15" text-anchor="middle" font-size="9" fill="#52606d">空泡</text><rect x="604" y="120" width="44" height="30" rx="3" fill="#eceff3" stroke="#7b8794" stroke-width="1" stroke-dasharray="3 2"/><text x="626.0" y="138.15" text-anchor="middle" font-size="9" fill="#52606d">空泡</text><rect x="648" y="120" width="44" height="30" rx="3" fill="#2b6cb0" stroke="#7b8794" stroke-width="1"/><text x="670.0" y="139.2" text-anchor="middle" font-size="12" fill="white">Max3</text><rect x="692" y="120" width="44" height="30" rx="3" fill="#eceff3" stroke="#7b8794" stroke-width="1" stroke-dasharray="3 2"/><text x="714.0" y="138.15" text-anchor="middle" font-size="9" fill="#52606d">空泡</text><rect x="736" y="120" width="44" height="30" rx="3" fill="#eceff3" stroke="#7b8794" stroke-width="1" stroke-dasharray="3 2"/><text x="758.0" y="138.15" text-anchor="middle" font-size="9" fill="#52606d">空泡</text><rect x="780" y="120" width="44" height="30" rx="3" fill="#eceff3" stroke="#7b8794" stroke-width="1" stroke-dasharray="3 2"/><text x="802.0" y="138.15" text-anchor="middle" font-size="9" fill="#52606d">空泡</text><text x="892" y="139.0" font-size="12" fill="#d64545" text-anchor="end" font-weight="700">利用率 1/L</text><line x1="142.0" y1="156" x2="142.0" y2="170" stroke="#d64545" stroke-width="1.4"/><line x1="142.0" y1="170" x2="318.0" y2="170" stroke="#d64545" stroke-width="1.6" marker-end="url(#ar)"/><text x="328.0" y="174" font-size="11" fill="#d64545" text-anchor="start">等 Max0 结果（延迟 L=4 拍）→ 单路串行无事可发 → 空泡</text><text x="24" y="240" font-size="13" fill="#1f2933" text-anchor="start" font-weight="700">② unroll 多路并行（×4）：4 路独立的 Max 轮流填满空泡</text><text x="120" y="264" font-size="10" fill="#52606d" text-anchor="middle">0</text><text x="296" y="264" font-size="10" fill="#52606d" text-anchor="middle">4</text><text x="472" y="264" font-size="10" fill="#52606d" text-anchor="middle">8</text><text x="648" y="264" font-size="10" fill="#52606d" text-anchor="middle">12</text><text x="824" y="264" font-size="10" fill="#52606d" text-anchor="middle">16</text><text x="848" y="264" font-size="10" fill="#52606d" text-anchor="middle">cycle</text><rect x="120" y="272" width="44" height="30" rx="3" fill="#2b6cb0" stroke="#7b8794" stroke-width="1"/><text x="142.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M0·0</text><rect x="164" y="272" width="44" height="30" rx="3" fill="#2f855a" stroke="#7b8794" stroke-width="1"/><text x="186.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M1·0</text><rect x="208" y="272" width="44" height="30" rx="3" fill="#dd8b21" stroke="#7b8794" stroke-width="1"/><text x="230.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M2·0</text><rect x="252" y="272" width="44" height="30" rx="3" fill="#7e57c2" stroke="#7b8794" stroke-width="1"/><text x="274.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M3·0</text><rect x="296" y="272" width="44" height="30" rx="3" fill="#2b6cb0" stroke="#7b8794" stroke-width="1"/><text x="318.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M0·1</text><rect x="340" y="272" width="44" height="30" rx="3" fill="#2f855a" stroke="#7b8794" stroke-width="1"/><text x="362.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M1·1</text><rect x="384" y="272" width="44" height="30" rx="3" fill="#dd8b21" stroke="#7b8794" stroke-width="1"/><text x="406.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M2·1</text><rect x="428" y="272" width="44" height="30" rx="3" fill="#7e57c2" stroke="#7b8794" stroke-width="1"/><text x="450.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M3·1</text><rect x="472" y="272" width="44" height="30" rx="3" fill="#2b6cb0" stroke="#7b8794" stroke-width="1"/><text x="494.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M0·2</text><rect x="516" y="272" width="44" height="30" rx="3" fill="#2f855a" stroke="#7b8794" stroke-width="1"/><text x="538.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M1·2</text><rect x="560" y="272" width="44" height="30" rx="3" fill="#dd8b21" stroke="#7b8794" stroke-width="1"/><text x="582.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M2·2</text><rect x="604" y="272" width="44" height="30" rx="3" fill="#7e57c2" stroke="#7b8794" stroke-width="1"/><text x="626.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M3·2</text><rect x="648" y="272" width="44" height="30" rx="3" fill="#2b6cb0" stroke="#7b8794" stroke-width="1"/><text x="670.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M0·3</text><rect x="692" y="272" width="44" height="30" rx="3" fill="#2f855a" stroke="#7b8794" stroke-width="1"/><text x="714.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M1·3</text><rect x="736" y="272" width="44" height="30" rx="3" fill="#dd8b21" stroke="#7b8794" stroke-width="1"/><text x="758.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M2·3</text><rect x="780" y="272" width="44" height="30" rx="3" fill="#7e57c2" stroke="#7b8794" stroke-width="1"/><text x="802.0" y="290.5" text-anchor="middle" font-size="10" fill="white">M3·3</text><text x="892" y="291.0" font-size="12" fill="#2f855a" text-anchor="end" font-weight="700">利用率 ≈1</text><line x1="142.0" y1="308" x2="142.0" y2="322" stroke="#1f2933" stroke-width="1.2"/><line x1="142.0" y1="322" x2="318.0" y2="322" stroke="#1f2933" stroke-width="1.4" marker-end="url(#a)"/><text x="328.0" y="326" font-size="11" fill="#1f2933" text-anchor="start">M0·0 结果就绪，正好接 M0·1（中间 3 拍由 M1/M2/M3 填上）</text><rect x="24" y="372" width="852" height="84" rx="8" fill="#f7f9fc" stroke="#d7dde5"/><text x="38" y="394" font-size="13" fill="#1f2933" text-anchor="start" font-weight="700">三条优化路径，本质都在「缩短或填满」这段串行依赖：</text><text x="38" y="416" font-size="12" fill="#52606d" text-anchor="start">• unroll：指令数不变，用 4 路独立填满空泡（隐藏延迟）；还能配合硬件双发（每拍 2 条）再压。</text><text x="38" y="436" font-size="12" fill="#52606d" text-anchor="start">• binary（仅 reduce_sum）：把串行依赖直接变短（步数 4→2）+ 成对折叠令总 Add/ReduceSum 减半 → 既减步数又减量，故最快。</text><text x="38" y="454" font-size="12" fill="#d64545" text-anchor="start">• pragma：只复制循环体，仍串在同一 acc 上 → 串行步数不变、空泡照旧 → 对归约无效。</text></svg>