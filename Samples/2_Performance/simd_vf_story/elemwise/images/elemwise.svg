<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 330" font-family="Noto Sans CJK SC,Microsoft YaHei,PingFang SC,Segoe UI,Helvetica,Arial,sans-serif"><defs><marker id="a" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto"><path d="M0,0 L7.5,3 L0,6 Z" fill="#1f2933"/></marker><marker id="ar" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto"><path d="M0,0 L7.5,3 L0,6 Z" fill="#d64545"/></marker><marker id="ab" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto"><path d="M0,0 L7.5,3 L0,6 Z" fill="#2b6cb0"/></marker><marker id="ag" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto"><path d="M0,0 L7.5,3 L0,6 Z" fill="#2f855a"/></marker></defs><rect x="0" y="0" width="820" height="330" fill="white"/><text x="20" y="30" font-size="17" fill="#1f2933" text-anchor="start" font-weight="700">elemwise AXPY：z = a·x + y，lane 间无依赖（throughput-bound）</text><text x="20" y="50" font-size="12" fill="#52606d" text-anchor="start">每个 lane 独立计算，没有循环携带依赖 → 没有可缩短的串行依赖。</text><rect x="70" y="90" width="140" height="30" rx="6" fill="#fbeec1" stroke="#caa83a" stroke-width="1.5"/><text x="140.0" y="109.2" text-anchor="middle" font-size="12" fill="#1f2933">LoadAlign x,y</text><rect x="220" y="90" width="140" height="30" rx="6" fill="#eef2f7" stroke="#2b6cb0" stroke-width="1.5"/><text x="290.0" y="109.2" text-anchor="middle" font-size="12" fill="#1f2933">Muls a·x</text><line x1="210" y1="105" x2="220" y2="105" stroke="#1f2933" stroke-width="1.6" marker-end="url(#a)"/><rect x="370" y="90" width="140" height="30" rx="6" fill="#eef2f7" stroke="#2b6cb0" stroke-width="1.5"/><text x="440.0" y="109.2" text-anchor="middle" font-size="12" fill="#1f2933">Add +y</text><line x1="360" y1="105" x2="370" y2="105" stroke="#1f2933" stroke-width="1.6" marker-end="url(#a)"/><rect x="520" y="90" width="140" height="30" rx="6" fill="#e9defa" stroke="#7e57c2" stroke-width="1.5"/><text x="590.0" y="109.2" text-anchor="middle" font-size="12" fill="#1f2933">StoreAlign z</text><line x1="510" y1="105" x2="520" y2="105" stroke="#1f2933" stroke-width="1.6" marker-end="url(#a)"/><text x="70" y="142" font-size="11" fill="#52606d" text-anchor="start">中间结果全程留在 RegTensor（计算链路压缩，不回写 UB）</text><text x="20" y="180" font-size="13" fill="#1f2933" text-anchor="start" font-weight="700">三种写法 = 同一计算的不同「指令级并行」表达：</text><rect x="60" y="198" width="90" height="26" rx="6" fill="#eef2f7" stroke="#7b8794" stroke-width="1.5"/><text x="105.0" y="215.2" text-anchor="middle" font-size="12" fill="#1f2933">baseline</text><text x="160" y="215" font-size="12" fill="#52606d" text-anchor="start">单组寄存器，一轮 1 个 VL 块</text><rect x="60" y="234" width="90" height="26" rx="6" fill="#eef2f7" stroke="#2b6cb0" stroke-width="1.5"/><text x="105.0" y="251.2" text-anchor="middle" font-size="12" fill="#2b6cb0">unroll</text><text x="160" y="251" font-size="12" fill="#52606d" text-anchor="start">4 组独立命名寄存器，一轮 4 个 VL 块（手写暴露多条独立指令流）</text><rect x="60" y="270" width="90" height="26" rx="6" fill="#eef2f7" stroke="#2b6cb0" stroke-width="1.5"/><text x="105.0" y="287.2" text-anchor="middle" font-size="12" fill="#2b6cb0">pragma</text><text x="160" y="287" font-size="12" fill="#52606d" text-anchor="start">循环体同 baseline，#pragma unroll 4 由编译器展开</text><text x="60" y="310" font-size="12" fill="#d64545" text-anchor="start" font-weight="700">实测 PUSHQ VF：baseline 625 / unroll 646 / pragma 640，展开不增益（已吞吐打满，反增标量开销 −2~3.4%）</text></svg>